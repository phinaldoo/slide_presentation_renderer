limit_req_zone $binary_remote_addr zone=api_limit_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=signup_limit_per_ip:2m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    error_page 403 =307 /ipban.html;
    error_page 500 =307 /error.html;
    error_page 504 =307 /error.html;

    # Per-client connection cap (helps protect WebSocket endpoints too)
    limit_conn conn_limit_per_ip 20;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

    # Signup endpoint gets its own hard cap (3/min per IP)
    location = /api/v1/auth/signup {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRFToken" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary "Origin" always;
            return 204;
        }

        limit_req zone=signup_limit_per_ip nodelay;

        proxy_pass http://fastapi:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        client_max_body_size 100M;
        client_body_timeout 300s;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # Proxy all other API requests to FastAPI service
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRFToken" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary "Origin" always;
            return 204;
        }

        # Rate-limit bursts of API calls per client IP (softer global limit)
        limit_req zone=api_limit_per_ip burst=40 nodelay;

        proxy_pass http://fastapi:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        client_max_body_size 100M;
        client_body_timeout 300s;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        # IMPORTANT: enable streaming by disabling buffering and compression
        proxy_buffering off;          # do not buffer upstream responses
        proxy_cache off;              # ensure no caching interferes
        gzip off;                     # disable gzip in this location to avoid buffering
        chunked_transfer_encoding on; # allow chunked responses to flush progressively
        # Also explicitly tell Nginx not to buffer even if upstream doesn't set it
        add_header X-Accel-Buffering no;
    }

    # FastAPI docs and schema
    location /docs {
        proxy_pass http://fastapi:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
    }

    location /redoc {
        proxy_pass http://fastapi:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
    }

    location /openapi.json {
        proxy_pass http://fastapi:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
    }

    location = /change_password {
        try_files /change_password.html =404;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    location ^~ /admin/chats {
        try_files /admin_chats.html =404;
    }

    location ^~ /admin/ {
        try_files /admin.html =404;
    }

    location = /error {
        try_files /error.html =404;
    }

    location = /ipban {
        try_files /ipban.html =404;
    }

    location = /leaderboard {
        try_files /leaderboard.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /user_setup {
        try_files /user_setup.html =404;
    }

    location = /server_setup {
        try_files /server_setup.html =404;
    }

    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }
}
