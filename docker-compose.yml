services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: slide-renderer-backend:latest
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEVELOPMENT_MODE: ${DEVELOPMENT_MODE:-false}
      ENABLE_DOCS: '${ENABLE_DOCS:-false}'
      ALLOW_INSECURE_PRODUCTION_CONFIGURATION: ${ALLOW_INSECURE_PRODUCTION_CONFIGURATION:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      API_KEY_AUTH_ENABLED: ${API_KEY_AUTH_ENABLED:-true}
      API_KEYS: '${API_KEYS:-}'
      RENDER_TIMEOUT_SECONDS: ${RENDER_TIMEOUT_SECONDS:-180}
      RENDER_QUEUE_TIMEOUT_MS: ${RENDER_QUEUE_TIMEOUT_MS:-500}
      PAGE_LOAD_TIMEOUT_MS: ${PAGE_LOAD_TIMEOUT_MS:-30000}
      MAX_CONCURRENT_RENDERS: ${MAX_CONCURRENT_RENDERS:-2}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-180000000}
      MAX_HTML_CHARS: ${MAX_HTML_CHARS:-2000000}
      MAX_INPUT_FILES: ${MAX_INPUT_FILES:-32}
      MAX_ASSET_BYTES: ${MAX_ASSET_BYTES:-25000000}
      MAX_TOTAL_ASSET_BYTES: ${MAX_TOTAL_ASSET_BYTES:-120000000}
    expose:
      - "8000"
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
      - /dev/shm:size=512m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: slide-renderer-nginx:latest
    environment:
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-180000000}
      RENDER_TIMEOUT_SECONDS: ${RENDER_TIMEOUT_SECONDS:-180}
      FRONTEND_USE_HTTPS: ${FRONTEND_USE_HTTPS:-false}
      FRONTEND_SSL_CERT_PATH: ${FRONTEND_SSL_CERT_PATH:-/certs/fullchain.pem}
      FRONTEND_SSL_KEY_PATH: ${FRONTEND_SSL_KEY_PATH:-/certs/privkey.pem}
      FRONTEND_SSL_CHAIN_PATH: ${FRONTEND_SSL_CHAIN_PATH:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./certs:/certs:ro
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m
      - /var/run:size=1m
      - /etc/nginx/conf.d:size=1m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ \"$${FRONTEND_USE_HTTPS:-false}\" = \"true\" ]; then wget --no-check-certificate -q -O /dev/null https://127.0.0.1:8080/readyz; else wget -q -O /dev/null http://127.0.0.1:8080/readyz; fi",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
